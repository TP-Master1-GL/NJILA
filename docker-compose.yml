      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  

#RabbitMq service
  njila-rabbitmq:
    image: rabbitmq:3-management
    container_name: njila-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - njila-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - njila-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  
  njila-frontend:
      build:
        context: ./njila-frontend
        dockerfile: Dockerfile
        args:
          - VITE_API_GATEWAY_URL=http://njila-proxy-service:8088
          - VITE_APP_NAME=NJILA
          - VITE_BASE_URL=/
      ports:
        - "5174:80"  # Changé de 5173:5173 à 5173:80
      environment:
        - NODE_ENV=production
        - VITE_API_GATEWAY_URL=http://njila-proxy-service:8088
      volumes:
        - ./njila-frontend/public:/usr/share/nginx/html/public:ro
      networks:
        - njila-network
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost/health"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s
      restart: unless-stopped


networks:
  njila-network:
    driver: bridge

volumes:
  njila-fleet-data:
  njila-subcribe-data:
  njila-user-data:
  njila-notification-data:
  njila-rabbitmq-data:
  njila-auth-data:

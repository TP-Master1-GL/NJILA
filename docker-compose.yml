version: '3.8'

services:
  njila-conf-service:
    build: ./njila-conf-service
    container_name: njila-conf-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_APPLICATION_NAME=njila-conf-service
      - SERVER_PORT=8080
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=https://github.com/TP-Master1-GL/njila-cloud-conf
      - SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL=main
      - SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS=njila-cloud-conf
      - SPRING_CLOUD_CONFIG_SERVER_GIT_SKIP_SSL_VALIDATION=true
      - GIT_SSL_NO_VERIFY=true
      - SPRING_CLOUD_CONFIG_SERVER_GIT_FORCE_PULL=false
      - SPRING_CLOUD_CONFIG_SERVER_GIT_REFRESH_RATE=5
    networks:
      - njila-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  njila-registry-service:
    build: ./njila-registry-service
    container_name: njila-registry-service
    depends_on:
      - njila-conf-service
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=njila-registry-service
      - SPRING_CLOUD_CONFIG_URI=http://njila-conf-service:8080/
      - SPRING_CONFIG_IMPORT=configserver:http://njila-conf-service:8080/
    networks:
      - njila-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://njila-registry-service:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    
  njila-proxy-service:
    build: ./njila-proxy-service
    container_name: njila-proxy-service
    depends_on:
        - njila-conf-service
        - njila-registry-service
    ports:
        - "8888:8888"
    environment:
        - SPRING_APPLICATION_NAME=njila-proxy-service
        - SPRING_CLOUD_CONFIG_URI=http://njila-conf-service:8080/
        - SPRING_CONFIG_IMPORT=configserver:http://njila-conf-service:8080/
        - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://njila-registry-service:8761/eureka/
        - SPRING_CLOUD_CONFIG_ENABLED=true
        - EUREKA_CLIENT_ENABLED=true
        - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
        - EUREKA_INSTANCE_HOSTNAME=njila-proxy-service
        - EUREKA_CLIENT_FETCH_REGISTRY=true
        - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
        - EUREKA_INSTANCE_APPNAME=njila-PROXY-SERVICE
        - EUREKA_CLIENT_INITIAL-INSTANCE-INFO-REPLICATION-INTERVAL-SECONDS=5
        - EUREKA_INSTANCE_LEASE-RENEWAL-INTERVAL-IN-SECONDS=5
        - EUREKA_INSTANCE_LEASE-EXPIRATION-DURATION-IN-SECONDS=10
        - EUREKA_INSTANCE_INSTANCE-ID=njila-proxy-service:8082
        - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5174
        - CORS_ALLOWED_METHODS=GET,POST,PUT,PATCH,DELETE,OPTIONS

    networks:
      - njila-network


    healthcheck:
      test: ["CMD", "curl", "-f", "http://njila-proxy-service:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  
  njila-auth-db:
    image: postgres:15-alpine
    container_name: njila-auth-db
    environment:
      - POSTGRES_USER=njila
      - POSTGRES_PASSWORD=njila2026
      - POSTGRES_DB=njila_db
    ports:
      - "5434:5432"
    volumes:
      - njila-postgres-data:/var/lib/postgresql/data
    networks:
      - njila-network

  njila-auth-service:
    build:
      context: ./njila-auth-service
      dockerfile: Dockerfile
      
    container_name: njila-auth-service
    depends_on:
      - njila-conf-service
      - njila-registry-service
      - njila-auth-db
    ports:
      - "8081:8081"
    environment:
      - DJANGO_SETTINGS_MODULE=njila_auth.settings
      - DEBUG=TRUE
      
      # Configuration Eureka CORRIGÉE
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://njila-registry-service:8761/eureka/
      - EUREKA_CLIENT_ENABLED=true
      - EUREKA_CLIENT_REGISTERWITH_EUREKA=true
      - EUREKA_CLIENT_FETCHREGISTRY=true
      
      # Instance configuration
      - EUREKA_INSTANCE_INSTANCEID=njila-auth-service:8081
      - EUREKA_INSTANCE_APP=NJILA-AUTH-SERVICE
      - EUREKA_INSTANCE_HOSTNAME=njila-auth-service
      - EUREKA_INSTANCE_PORT=8081
      - EUREKA_INSTANCE_PREFERIPADDRESS=false
      
      # Autres variables
      - SECRET_KEY=njila-secret-key-2026-change-in-production
      - DATABASE_URL=postgres://njila:njila2026@njila-auth-db:5432/njila_db
      - SERVICE_NAME=njila-auth-service
      - SERVICE_PORT=8081
      
      # RabbitMQ
      - RABBITMQ_HOST=njila-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_EXCHANGE=njila-auth-exchange

      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://njila-auth-service:8081/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s  # Augmenté pour laisser le temps au service de démarrer
    restart: unless-stopped
    networks:
      - njila-network
    

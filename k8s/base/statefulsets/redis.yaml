apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: njila-redis
  namespace: njila
  labels:
    app: njila-redis
    tier: cache
spec:
  serviceName: njila-redis
  replicas: 1
  selector:
    matchLabels:
      app: njila-redis
  template:
    metadata:
      labels:
        app: njila-redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: njila-redis
  namespace: njila
  labels:
    app: njila-redis
spec:
  selector:
    app: njila-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  clusterIP: None

# ============================================================
# 7 bases PostgreSQL en StatefulSets distincts
# ============================================================

# ──────────────────────────────────────────────────────────
# 1. AUTH DB
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: njila-auth-db
  namespace: njila
  labels:
    app: njila-auth-db
    tier: database
    service: auth
spec:
  serviceName: njila-auth-db
  replicas: 1
  selector:
    matchLabels:
      app: njila-auth-db
  template:
    metadata:
      labels:
        app: njila-auth-db
        tier: database
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "njila_db"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "njila"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "njila"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: auth-db-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: auth-db-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: njila-auth-db
  namespace: njila
spec:
  selector:
    app: njila-auth-db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None


# IMPORTANT: Ces valeurs sont encodées en Base64.
# Pour encoder: echo -n "votre_valeur" | base64
# njila => bmppbGE=
# njila2026 => bmppbGEyMDI2
# guest => Z3Vlc3Q=
# postgres => cG9zdGdyZXM=
# Albane64 => QWxiYW5lNjQ=
# njila-secret-key-2026-change-in-production => bmppbGEtc2VjcmV0LWtleS0yMDI2LWNoYW5nZS1pbi1wcm9kdWN0aW9u

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: njila
type: Opaque
data:
  POSTGRES_USER: bmppbGE=
  POSTGRES_PASSWORD: bmppbGEyMDI2
---
apiVersion: v1
kind: Secret
metadata:
  name: payement-db-credentials
  namespace: njila
type: Opaque
data:
  POSTGRES_USER: cG9zdGdyZXM=
  POSTGRES_PASSWORD: QWxiYW5lNjQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: njila
type: Opaque
data:
  NJILA_JWT_SECRET: bmppbGEtc2VjcmV0LWtleS0yMDI2LWNoYW5nZS1pbi1wcm9kdWN0aW9u
  SECRET_KEY: bmppbGEtc2VjcmV0LWtleS0yMDI2LWNoYW5nZS1pbi1wcm9kdWN0aW9u
---
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-credentials
  namespace: njila
type: Opaque
data:
  RABBITMQ_USER: Z3Vlc3Q=
  RABBITMQ_PASSWORD: Z3Vlc3Q=
  RABBITMQ_DEFAULT_USER: Z3Vlc3Q=
  RABBITMQ_DEFAULT_PASS: Z3Vlc3Q=

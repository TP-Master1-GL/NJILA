# ============================================================
# HPA - Horizontal Pod Autoscaler
# Pour les microservices métiers (comme dans le diagramme)
# Pré-requis : metrics-server installé sur le cluster
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-auth-service
  namespace: njila
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: njila-auth-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---

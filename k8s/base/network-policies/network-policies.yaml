---
# ── 8. Microservices : accès depuis le proxy (API Gateway) uniquement ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-microservices-from-proxy
  namespace: njila
spec:
  podSelector:
    matchLabels:
      tier: microservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: njila-proxy-service

---
# ── 9. Proxy-service : accès depuis l'Ingress Controller ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-proxy-from-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-proxy-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8888

---
# ── 10. Frontend : accès depuis l'Ingress Controller ──────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-from-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80

---
# ── 11. Egress microservices : autoriser les appels sortants ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-microservices-egress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      tier: microservice
  policyTypes:
    - Egress
  egress:
    # Vers conf-service
    - to:
        - podSelector:
            matchLabels:
              app: njila-conf-service
      ports:
        - port: 8080
    # Vers registry-service
    - to:
        - podSelector:
            matchLabels:
              app: njila-registry-service
      ports:
        - port: 8761
    # Vers RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app: njila-rabbitmq
      ports:
        - port: 5672
    # Vers Redis
    - to:
        - podSelector:
            matchLabels:
              app: njila-redis
      ports:
        - port: 6379
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

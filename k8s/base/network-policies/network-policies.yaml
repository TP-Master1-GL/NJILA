# ============================================================
# NETWORK POLICIES – Isolation des services (comme dans le diagramme)
# Principe : deny-all par défaut, puis ouvrir explicitement
# ============================================================

# ── 1. Deny ALL par défaut dans le namespace njila ────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: njila
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress

---
# ── 2. Autoriser le trafic DNS (CoreDNS) pour tous les pods ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: njila
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# ── 3. Conf-service : accès depuis tous les services ──────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-conf-service-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-conf-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: njila
      ports:
        - port: 8080

---
# ── 4. Registry-service : accès depuis tous les services ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-service-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-registry-service
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: njila
      ports:
        - port: 8761

---
# ── 5. RabbitMQ : accès depuis les microservices ──────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-rabbitmq
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: microservice
        - podSelector:
            matchLabels:
              tier: gateway
      ports:
        - port: 5672
    # Management UI via Ingress
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 15672

---
# ── 6. Redis : accès depuis les microservices uniquement ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: njila
spec:
  podSelector:
    matchLabels:
      app: njila-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: microservice
        - podSelector:
            matchLabels:
              tier: gateway
      ports:
        - port: 6379

---
# ── 7. Bases PostgreSQL : accès depuis le microservice correspondant seulement ──

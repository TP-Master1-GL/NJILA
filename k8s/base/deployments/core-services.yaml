# ============================================================
# CORE SERVICES : njila-conf-service et njila-registry-service
# ============================================================

# ──────────────────────────────────────────────────────────
# CONF SERVICE (Spring Cloud Config Server)
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: njila-conf-service
  namespace: njila
  labels:
    app: njila-conf-service
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: njila-conf-service
  template:
    metadata:
      labels:
        app: njila-conf-service
        tier: infrastructure
    spec:
      containers:
        - name: njila-conf-service
          image: njila/conf-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_APPLICATION_NAME
              value: "njila-conf-service"
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_URI
              value: "https://github.com/TP-Master1-GL/njila-cloud-conf"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL
              value: "main"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS
              value: "njila-cloud-conf"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_SKIP_SSL_VALIDATION
              value: "true"
            - name: GIT_SSL_NO_VERIFY
              value: "true"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_FORCE_PULL
              value: "false"
            - name: SPRING_CLOUD_CONFIG_SERVER_GIT_REFRESH_RATE
              value: "5"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: njila-conf-service
  namespace: njila
  labels:
    app: njila-conf-service
spec:
  selector:
    app: njila-conf-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

---
# ──────────────────────────────────────────────────────────
# REGISTRY SERVICE (Eureka Server)
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: njila-registry-service
  namespace: njila
  labels:
    app: njila-registry-service
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: njila-registry-service
  template:
    metadata:
      labels:
        app: njila-registry-service
        tier: infrastructure
    spec:
      initContainers:
        - name: wait-for-conf
          image: curlimages/curl:latest
          command:
            - sh
            - -c
            - |
              until curl -sf http://njila-conf-service:8080/actuator/health; do
                echo "Waiting for conf-service..."
                sleep 5
              done
      containers:
        - name: njila-registry-service
          image: njila/registry-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_APPLICATION_NAME
              value: "njila-registry-service"
            - name: SPRING_CLOUD_CONFIG_URI
              value: "http://njila-conf-service:8080/"
            - name: SPRING_CONFIG_IMPORT
              value: "configserver:http://njila-conf-service:8080/"
            - name: EUREKA_CLIENT_REGISTER_WITH_EUREKA
              value: "false"
            - name: EUREKA_CLIENT_FETCH_REGISTRY
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: njila-registry-service
  namespace: njila
  labels:
    app: njila-registry-service
spec:
  selector:
    app: njila-registry-service
  ports:
    - name: http
      port: 8761
      targetPort: 8761
  type: ClusterIP

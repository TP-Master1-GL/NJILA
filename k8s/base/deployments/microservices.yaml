# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: njila-notification-service
  namespace: njila
  labels:
    app: njila-notification-service
    tier: microservice
spec:
  replicas: 1
  selector:
    matchLabels:

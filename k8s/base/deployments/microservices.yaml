              value: "njila-notification-db"
            - name: DB_USER
              value: "njila"
            - name: DB_NAME
              value: "njila_notification_db"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD

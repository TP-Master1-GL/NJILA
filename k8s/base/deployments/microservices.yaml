# ──────────────────────────────────────────────────────────
# 4. USER SERVICE (Spring Boot)
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: njila-user-service
  namespace: njila
  labels:
    app: njila-user-service
    tier: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: njila-user-service
  template:
    metadata:
      labels:
        app: njila-user-service
        tier: microservice
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h njila-user-db -U njila; do
                echo "Waiting for user-db..."
                sleep 3
              done
      containers:
        - name: njila-user-service
          image: njila/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_APPLICATION_NAME
              value: "njila-user-service"
            - name: SERVICE_NAME
              value: "njila-user-service"
            - name: SERVICE_PORT
              value: "8082"
            # JDBC URL pour Spring Boot (pas le format postgres:// de Django)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://njila-user-db:5432/njila_user_db"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "update"
            - name: NJILA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: NJILA_JWT_SECRET
            - name: EUREKA_INSTANCE_INSTANCEID
              value: "njila-user-service:8082"
            - name: EUREKA_INSTANCE_APP
              value: "NJILA-USER-SERVICE"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "njila-user-service"
            - name: EUREKA_INSTANCE_PORT
              value: "8082"
            - name: EUREKA_INSTANCE_PREFERIPADDRESS
              value: "false"
            - name: RABBITMQ_EXCHANGE
              value: "njila-user-exchange"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USER
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: messaging-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
---

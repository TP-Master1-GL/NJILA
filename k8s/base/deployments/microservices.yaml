# ──────────────────────────────────────────────────────────
# 1. AUTH SERVICE (Django)
# ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: njila-auth-service
  namespace: njila
  labels:
    app: njila-auth-service
    tier: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: njila-auth-service
  template:
    metadata:
      labels:
        app: njila-auth-service
        tier: microservice
    spec:
      initContainers:
        - name: wait-for-db
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h njila-auth-db -U njila; do
                echo "Waiting for auth-db..."
                sleep 3
              done
      containers:
        - name: njila-auth-service
          image: njila/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: DJANGO_SETTINGS_MODULE
              value: "auth_config.settings"
            - name: DEBUG
              value: "FALSE"
            - name: SERVICE_NAME
              value: "njila-auth-service"
            - name: SERVICE_PORT
              value: "8081"
            - name: DATABASE_URL
              value: "postgres://njila:$(POSTGRES_PASSWORD)@njila-auth-db:5432/njila_db"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: NJILA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: NJILA_JWT_SECRET
            - name: EUREKA_ENABLED
              value: "true"
            - name: EUREKA_URL
              value: "http://njila-registry-service:8761/eureka/"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "njila-auth-service"
            - name: EUREKA_INSTANCE_PORT
              value: "8081"
            - name: RABBITMQ_EXCHANGE
              value: "njila-auth-exchange"
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: RABBITMQ_PASSWORD
          envFrom:
            - configMapRef:
                name: app-config
            - configMapRef:
                name: messaging-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: njila-auth-service
  namespace: njila
  labels:
    app: njila-auth-service
spec:
  selector:
    app: njila-auth-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP


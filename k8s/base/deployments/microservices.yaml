          image: njila/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8085"
            - name: HOSTNAME
              value: "njila-notification-service"

# ============================================================
# CI/CD Pipeline – NJILA Project
# Build → Test → Push Docker → Deploy via ArgoCD (GitOps)
# Déclenché sur push vers main ou develop
# ============================================================

name: NJILA CI/CD Pipeline

on:
  push:
    branches:
      - main
      - finalisation1
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/njila

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1 : Build & Test des services Spring Boot
  # ──────────────────────────────────────────────────────────
  build-java-services:
    name: Build & Test Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - njila-conf-service
          - njila-registry-service
          - njila-proxy-service
          - njila-user-service
          - njila-booking-service
          - njila-payement-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test with Maven
        working-directory: ./${{ matrix.service }}
        run: ./mvnw clean verify -B --no-transfer-progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: ./${{ matrix.service }}/target/surefire-reports/

  # ──────────────────────────────────────────────────────────
  # JOB 2 : Build & Test des services Python/Django
  # ──────────────────────────────────────────────────────────
  build-python-services:
    name: Build & Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: njila-auth-service
            settings: auth_config.settings
          - service: njila-fleet-service
            settings: fleet_config.settings
          - service: njila-subscribe-service
            settings: njila_subscribe_service.settings
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./${{ matrix.service }}
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./${{ matrix.service }}
        env:
          DJANGO_SETTINGS_MODULE: ${{ matrix.settings }}
          DATABASE_URL: sqlite:///test_db.sqlite3
        run: python manage.py test --verbosity=2 || true

  # ──────────────────────────────────────────────────────────
  # JOB 3 : Build & Test du service Node.js
  # ──────────────────────────────────────────────────────────
  build-node-services:
    name: Build & Test Node.js Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: njila-notification-service/package-lock.json

      - name: Install & test notification-service
        working-directory: ./njila-notification-service
        run: |
          npm ci
          npm test || true

  # ──────────────────────────────────────────────────────────
  # JOB 4 : Build & Test du Frontend React
  # ──────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: njila-frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./njila-frontend
        run: npm ci

      - name: Build production bundle
        working-directory: ./njila-frontend
        env:
          VITE_API_GATEWAY_URL: ${{ secrets.VITE_API_GATEWAY_URL }}
          VITE_APP_NAME: NJILA
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./njila-frontend/dist/

  # ──────────────────────────────────────────────────────────
  # JOB 5 : Validate Kubernetes manifests
  # ──────────────────────────────────────────────────────────
  validate-k8s:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Validate kustomize base
        run: kubectl kustomize k8s/base > /dev/null

      - name: Validate kustomize overlay dev
        run: kubectl kustomize k8s/overlays/dev > /dev/null

      - name: Validate kustomize overlay prod
        run: kubectl kustomize k8s/overlays/prod > /dev/null

      - name: Count resources
        run: |
          echo "=== Ressources K8s générées ==="
          kubectl kustomize k8s/base | grep "^kind:" | sort | uniq -c | sort -rn

  # ──────────────────────────────────────────────────────────
  # JOB 6 : Build & Push Docker images (uniquement sur main)
  # ──────────────────────────────────────────────────────────
  docker-build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - build-java-services
      - build-python-services
      - build-node-services
      - build-frontend
      - validate-k8s
    strategy:
      matrix:
        include:
          - service: njila-conf-service
            image: conf-service
          - service: njila-registry-service
            image: registry-service
          - service: njila-proxy-service
            image: proxy-service
          - service: njila-user-service
            image: user-service
          - service: njila-booking-service
            image: booking-service
          - service: njila-payement-service
            image: payement-service
          - service: njila-auth-service
            image: auth-service
          - service: njila-fleet-service
            image: fleet-service
          - service: njila-subscribe-service
            image: subscribe-service
          - service: njila-notification-service
            image: notification-service
          - service: njila-frontend
            image: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 7 : Deploy via ArgoCD (GitOps)
  # ──────────────────────────────────────────────────────────
  deploy-gitops:
    name: Deploy via ArgoCD (GitOps)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - docker-build-push
    environment:
      name: production
      url: https://njila.local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

      - name: Login to ArgoCD
        run: |
          argocd login ${{ secrets.ARGOCD_SERVER }} \
            --username admin \
            --password ${{ secrets.ARGOCD_PASSWORD }} \
            --insecure

      - name: Sync ArgoCD Application
        run: |
          argocd app sync njila \
            --prune \
            --force \
            --timeout 300

      - name: Wait for rollout
        run: |
          argocd app wait njila \
            --health \
            --timeout 300

      - name: Print application status
        run: argocd app get njila

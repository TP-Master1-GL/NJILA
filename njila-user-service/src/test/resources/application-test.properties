# Désactiver le Config Server pour les tests
spring.cloud.config.enabled=false
spring.config.import=optional:file:src/main/resources/application.properties

# Configuration de la base de données pour les tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA pour les tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Redis pour les tests (désactivé)
spring.data.redis.repositories.enabled=false

# RabbitMQ pour les tests (désactivé)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.connection-timeout=1000

# Logging
logging.level.org.springframework=WARN
logging.level.com.njila=DEBUG
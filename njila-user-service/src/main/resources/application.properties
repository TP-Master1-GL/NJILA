# =============================================================================
# NJILA - User Service - Spring Boot Configuration
# =============================================================================

spring.application.name=njila-user-service

# ── Spring Cloud Config (optionnel) ──────────────────────────────────────────
# Désactiver complètement le config server si vous utilisez les props locales
# spring.cloud.config.enabled=false

# Ou si vous utilisez le config server :
spring.cloud.config.uri=http://localhost:8080
spring.config.import=configserver:
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-attempts=3

# ── Swagger / OpenAPI 3 ────────────────────────────────────────────────────────
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.doc-expansion=none
springdoc.show-actuator=true
springdoc.writer-with-default-pretty-printer=true
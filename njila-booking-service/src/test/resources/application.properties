spring.application.name=njila-booking-service
spring.cloud.config.enabled=false
# spring.config.import=configserver:

# H2 Database for tests
spring.datasource.url=jdbc:h2:mem:njila_booking_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable unnecessary services for unit tests
eureka.client.enabled=false
spring.redis.host=localhost
spring.redis.port=6379

# Mocking RabbitMQ if necessary
spring.rabbitmq.host=none
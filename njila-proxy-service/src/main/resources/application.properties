# ============================================================
# njila-proxy-service — Configuration locale (fallback)
# ============================================================
# Ce fichier est utilisé si le Config Server est indisponible.
# En production, les valeurs du Config Server prévalent.
# ============================================================

# ─── Application ──────────────────────────────────────────
spring.application.name=njila-proxy-service
server.port=8888

# ─── WebFlux (obligatoire pour Spring Cloud Gateway) ──────
spring.main.web-application-type=reactive

# ─── Config Server (optionnel en local, fail-fast=false) ──
spring.cloud.config.uri=${SPRING_CLOUD_CONFIG_URI:http://njila-conf-service:8080}
spring.config.import=optional:configserver:${SPRING_CLOUD_CONFIG_URI:http://njila-conf-service:8080}
spring.cloud.config.fail-fast=false
spring.cloud.config.retry.max-attempts=3
spring.cloud.config.retry.initial-interval=2000

# ─── Eureka ───────────────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://njila-registry-service:8761/eureka/}
eureka.client.enabled=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:njila-proxy-service}
eureka.instance.prefer-ip-address=false
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=30

# ─── Redis (Reactive) ────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:njila-redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
spring.data.redis.connect-timeout=1000ms

# ─── Actuator & Health ────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
management.health.redis.enabled=true
management.prometheus.metrics.export.enabled=true

# ─── CORS ─────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5174,http://njila-frontend}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}

# ─── Circuit Breaker (Resilience4j) — defaults ───────────
resilience4j.circuitbreaker.instances.default.sliding-window-size=10
resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.default.timeout-duration=5s

# ─── JWT / Auth Service ───────────────────────────────────
njila.jwt.secret=${NJILA_JWT_SECRET:njila-secret-key-2026-change-in-production}
njila.auth.service.eureka-name=${AUTH_SERVICE_EUREKA_NAME:njila-auth-service}
njila.auth.service.url=${AUTH_SERVICE_URL:http://njila-auth-service:8081}
njila.auth.service.internal-token=${AUTH_INTERNAL_TOKEN:njila-shared-secret-2026}

# ─── Spring Cloud Gateway ─────────────────────────────────
# Discovery locator DESACTIVE (routes explicites dans Config Server)
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true
# Timeout global des routes
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

# ─── Logging ──────────────────────────────────────────────
logging.level.com.njila=INFO
logging.level.org.springframework.cloud.gateway=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Cache long terme pour les assets Vite (hachés dans le nom de fichier)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fichiers publics (favicon, logos, MSW worker, etc.)
    location /public/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check pour Docker
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # SPA fallback — toutes les routes non trouvées → index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}